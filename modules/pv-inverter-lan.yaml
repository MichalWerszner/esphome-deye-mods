substitutions:
  name: "modbus-gateway"

  # --- SECRETS ---
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  api_key: !secret pv_inverter_api_key
  ota_password: !secret pv_inverter_ota_password
  fallback_password: !secret pv_inverter_fallback_password

  # Safe Mode parameters for supported inverters
  safe_mode_delay: 600s # Time after which transition to safe mode and setting default operating parameters will occur
  default_maximum_battery_charge_current: "140" # Amps
  default_max_sell_power: "20" # Watts. Adjust to your inverter
  default_system_work_mode: "Zero Export To CT" # "Selling First", "Zero Export To Load", "Zero Export To CT"
  default_solar_sell: "off" # "on", "off"
  default_force_off_grid: "off" # "on", "off"

  enable_sync_time: false # true, false - Enable time sync with HomeAssistant (Deye 3P inverters only)

# WYBÓR TRYBU PRACY (Odkomentuj tylko jeden!)
  # network_mode: "WIFI" # dla modułu ESP32
  network_mode: "ETHERNET" # dla modułu WT32-ETH01 lub ESP32 + LAN8720

  # ===== MODUŁY – włącz / wyłącz =====
  enable_ethernet: "true"
  enable_oled: "true"
  enable_encoder: "true"
  enable_sensors: "true"
  enable_relays: "false"
  

  # ===== ETHERNET (Konfiguracja sprzętowa WT32-ETH01) =====
  # UWAGA: W WT32-ETH01 piny MDC, MDIO i CLK są stałe i nie zmieniamy ich fizycznie.
  eth_mdc_pin: GPIO23
  eth_mdio_pin: GPIO18
  eth_clk_pin: GPIO0_IN  # Kluczowe dla stabilności LAN
  eth_power_pin: GPIO16   # Pin 12 na listwie (zasilanie PHY)
  eth_phy_addr: "1"

  # ===== OLED SSD1306 ===== adres I2C = 0x3C zwykle; 3.3V nie 5V
  # Przeniesione na piny, które obsługują wyjście
  oled_sda: GPIO14  # Pin 15 na listwie
  oled_scl: GPIO15  # Pin 14 na listwie

  # ===== ENCODER KY-040 =====
  # Wykorzystujemy piny CFG i 485_EN z dokumentacji
  encoder_clk: GPIO32 # Pin 2 na listwie
  encoder_dt: GPIO33  # Pin 3 na listwie
  encoder_sw: GPIO35  # Pin 17 na listwie (Input only - idealny dla przycisku)

  # ===== DHT / DS =====
  dht_pin: GPIO4 # 10k pullup DHT (jeśli goły sensor)  # Pin 18 na listwie (obsługuje I/O)
  dht_model: DHT22
  ds18b20_pin: GPIO2 # ds18b20_pin: GPIO26 ESP+LAN ; 4.7k pullup OneWire między DATA a 3.3V, Pin 19 na listwie (Uwaga: musi być HIGH przy starcie!)

  # ===== RELAYS (max 12, -1 = brak) =====
  relay1_pin: GPIO12 # Pin 16 na listwie
  relay2_pin: GPIO13 # Pin 20 na listwie (ostatni wolny GPO)
  relay3_pin: "-1"
  relay4_pin: "-1"
  relay5_pin: "-1"
  relay6_pin: "-1"
  relay7_pin: "-1"
  relay8_pin: "-1"
  relay9_pin: "-1"
  relay10_pin: "-1"
  relay11_pin: "-1"
  relay12_pin: "-1"

  # ===== UART / Modbus ===== terminator 120Ω jeśli długi kabel
  # MODYFIKACJA: GPIO17 jest zajęte przez zegar 50MHz! Używamy GPIO5.
  modbus_inverter_address: "0x01" # Default Modbus address, should be changed to match inverter settings
  tx_pin: GPIO5  # Pin 9 na listwie
  rx_pin: GPIO36 # Pin 13 na listwie (Input only - idealny dla RX)
  baud_rate: "9600"

esphome:
  name: ${name}
  name_add_mac_suffix: true # To doda automatycznie unikalny SSID i hostname mDNS (np. modbus-gateway-a1b2c3)
  platformio_options:
    build_flags:
      - -DCONFIG_ESP32_WIFI_ENABLED
      - -DUSE_ETHERNET
      - -DUSE_WIFI
  friendly_name: "Modbus Gateway"
  project:
    name: "michalwerszner.deye_gateway"
    version: "1.1.1"
  includes: !override []

# Set appropriately if using a different board. https://esphome.io/components/#supported-microcontrollers
esp32:
  board: esp32dev
  framework:
    type: arduino

packages:
  # BAZA OD LEWA-REKA
  pv_inverter:
    url: https://github.com/Lewa-Reka/esphome-deye-inverter
    refresh: 12h
    files:
      ### Use the appropriate file for your inverter, uncomment the one you want to use ###
      # pv_inverter/deye_hybrid_1p_lv.yaml # SG0XLP1 Low Voltage (1P)
      pv_inverter/deye_hybrid_3p_lv.yaml # SG0XLP3 Low Voltage (3P)
      # pv_inverter/deye_hybrid_3p_hv.yaml # SG0XHP3 High Voltage (3P)

  # MODUŁY Z GITHUBA 
  my_extension:
    url: https://github.com/MichalWerszner/esphome-deye-mods
    ref: main
    files:
      - modules/globals.yaml
      - modules/ethernet.yaml
      - modules/oled.yaml
      - modules/encoder.yaml
      - modules/sensors.yaml
      - modules/relay.yaml
    refresh: 1min # Na czas testów dajemy 5 minut


logger:
#  level: VERBOSE # VERBOSE / DEBUG / INFO / WARN
  level: INFO

api:
  password: !remove
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: ${ota_password}

