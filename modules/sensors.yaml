# DHT22 / DHT11 / AM2302
sensor:
  - platform: dht
    pin: ${dht_pin}
    model: ${dht_model}
    temperature:
      name: "Temp"
    humidity:
      name: "Humidity"
    update_interval: 10s

# DS18B20 – wielokanałowo
one_wire:
  - platform: gpio
    pin: ${ds18b20_pin}

# Przykład dla 2 czujników DS18B20
sensor:
  - platform: dallas
    address: 0xAABBCCDDEEFF1122
    name: "DS18B20 #1"
  - platform: dallas
    address: 0x1122334455667788
    name: "DS18B20 #2"
