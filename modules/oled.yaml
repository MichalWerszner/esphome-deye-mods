interval:
  - interval: 2s
    then:
      - lambda: |-
          id(oled_page)++;
          if (id(oled_page) > 4) id(oled_page) = 0;

font:
  - file: "fonts/arial.ttf"
    id: font
    size: 10

i2c:
  sda: ${oled_sda}
  scl: ${oled_scl}

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      it.clear();

      // ===== PAGE 0 – NETWORK =====
      if (id(oled_page) == 0) {
        it.printf(0, 0, id(font), "%s IP",
          id(eth_connected) ? "LAN" :
          (WiFi.isConnected() ? "WiFi" : "AP"));
        it.printf(0, 12, id(font), "%s/%d",
          id(ip_address).state.c_str(),
          id(netmask_bits).state);
        it.printf(0, 24, id(font), "%s",
          id(ip_mode_static) ? "static" : "dhcp");
        it.printf(0, 48, id(font), "ID: %s", App.get_name().c_str());
      }
      it.printf(0, 0, id(my_font), "IP: %s", network::get_ip_address().c_str());
      const char *mode_str = "Unknown";
      if (id(network_mode_global) == 1) mode_str = "1: LAN DHCP";
      if (id(network_mode_global) == 2) mode_str = "2: WiFi DHCP";
      if (id(network_mode_global) == 3) mode_str = "3: WiFi AP";
      if (id(network_mode_global) == 4) mode_str = "4: MANUAL";
      it.printf(0, 20, id(my_font), "Tryb: %s", mode_str);
      
      // ===== PAGE 1 – MODBUS =====
      if (id(oled_page) == 1) {
        it.printf(0, 0, id(font), "Modbus");
        it.printf(0, 12, id(font), "Addr: 0x%02X", id(modbus_addr_runtime));
        it.printf(0, 24, id(font), "Baud: %d", id(modbus_baud_runtime));
      }

      // ===== PAGE 2 – INVERTER =====
      if (id(oled_page) == 2) {
        it.printf(0, 0, id(font), "Inverter");
        it.printf(0, 12, id(font), "Charge %dA", id(max_charge_current).state);
        it.printf(0, 24, id(font), "Sell %dW", id(max_sell_power).state);
        it.printf(0, 36, id(font), "%s", id(system_work_mode).state.c_str());
      }

      // ===== PAGE 3 – ENV =====
      if (id(oled_page) == 3) {
        int y = 0;
        if (id(dht_temp).has_state()) {
          it.printf(0, y, id(font), "DHT %.1fC", id(dht_temp).state); y += 12;
          it.printf(0, y, id(font), "Hum %.0f%%", id(dht_hum).state); y += 12;
        }
        if (id(ds18b20_1).has_state()) {
          it.printf(0, y, id(font), "DS %.1fC", id(ds18b20_1).state);
        }
      }

      // ===== PAGE 4 – RELAYS (ROLLING) =====
      if (id(oled_page) == 4) {
        int idx = 0;
        int shown = 0;

        auto draw_relay = [&](int n, auto &relay) {
          if (relay.has_state()) {
            if (idx / 4 == id(relay_page) && shown < 4) {
              it.printf(0, shown * 12, id(font),
                "R%d: %s", n, relay.state ? "ON" : "OFF");
              shown++;
            }
            idx++;
          }
        };

        draw_relay(1, id(relay1));
        draw_relay(2, id(relay2));
        draw_relay(3, id(relay3));
        draw_relay(4, id(relay4));
        draw_relay(5, id(relay5));
        draw_relay(6, id(relay6));
        draw_relay(7, id(relay7));
        draw_relay(8, id(relay8));
        draw_relay(9, id(relay9));
        draw_relay(10, id(relay10));
        draw_relay(11, id(relay11));
        draw_relay(12, id(relay12));

        if (idx > 4) {
          id(relay_page) = (id(relay_page) + 1) % ((idx + 3) / 4);
        }
      }



