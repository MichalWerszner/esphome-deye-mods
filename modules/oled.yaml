# Obsługa wyświetlacza OLED z cykliczną rotacją stron

interval:
  - interval: 3s
    then:
      - lambda: |-
          // Rotacja stron tylko, gdy nie jesteśmy w trybie edycji/interakcji
          if (!id(is_editing)) {
            id(oled_page)++;
            if (id(oled_page) > 4) id(oled_page) = 0;
          } else {
            // Timer powrotu do autoscrolla: jeśli minęło 10s od ostatniej akcji
            // id(edit_timeout)++; (można dodać dodatkowy licznik)
          }
font:
  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: my_font
    size: 10

  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: font_small
    size: 8

i2c:
  sda: ${oled_sda}
  scl: ${oled_scl}
  scan: true
  id: bus_a

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    lambda: |-
      it.clear();

      // ===== PAGE 0 – NETWORK =====
      if (id(oled_page) == 0) {
        it.printf(0, 0, id(my_font), "NET: %s", 
          (id(network_mode_global) == 1) ? "1: LAN DHCP" :
          (id(network_mode_global) == 2) ? "2: WiFi DHCP" :
          (id(network_mode_global) == 3) ? "3: WiFi AP" : "4: MANUAL");

        it.printf(0, 12, id(my_font), "IP: %s", network::get_ip_address().c_str());
        
        it.printf(0, 24, id(my_font), "Status: %s", 
          network::is_connected() ? "Connected" : "Searching...");

        if (id(is_editing)) it.print(0, 48, id(my_font), "> EDIT MODE <");
        else it.printf(0, 48, id(my_font), "ID: %s", App.get_name().c_str());
      }

      // ===== PAGE 1 – MODBUS =====
      if (id(oled_page) == 1) {
        it.printf(0, 0, id(my_font), "Modbus Config");
        it.printf(0, 15, id(my_font), "Addr: 0x%02X %s", id(modbus_address), id(is_editing) ? "<-" : "");
        it.printf(0, 30, id(my_font), "Baud: %d", id(modbus_baud));
        if (id(is_editing)) it.print(0, 50, id(my_font), "[Click to Save]");
      }

      // ===== PAGE 2 – INVERTER =====
      if (id(oled_page) == 2) {
        it.printf(0, 0, id(my_font), "Inverter Data");
        it.printf(0, 12, id(my_font), "Charge %dA", (int)id(maximum_battery_charge_current).state);
        it.printf(0, 24, id(my_font), "Sell %dW", (int)id(max_sell_power).state);
        it.printf(0, 36, id(my_font), "Mode: %s", id(system_work_mode).state.c_str());
      }

      // ===== PAGE 3 – ENV (Czujniki) =====
      if (id(oled_page) == 3) {
        int y = 0;
        it.print(0, y, id(my_font), "Environment:"); y += 12;
        ##if (id(dht_temp).has_state()) {
        ##  it.printf(0, y, id(my_font), "DHT: %.1fC | %.0f%%", id(dht_temp).state, id(dht_hum).state); y += 12;
        ##}
        if (id(ds18b20_1).has_state()) {
          it.printf(0, y, id(my_font), "DS: %.1fC", id(ext_temp).state); y += 12;
        } else {
          it.print(0, 12, id(my_font), "No sensor");
        }
      }

      // ===== PAGE 4 – RELAYS =====
      if (id(oled_page) == 4) {
        int idx = 0;
        int shown = 0;
        auto draw_relay = [&](int n, auto &relay) {
          if (relay.has_state()) {
            if (idx / 4 == id(relay_page) && shown < 4) {
              it.printf(0, shown * 12, id(my_font), "R%d: %s %s", n, 
                relay.state ? "ON" : "OFF", 
                (id(is_editing) && (shown == 0)) ? "<-" : ""); // Uproszczony wskaźnik edycji
              shown++;
            }
            idx++;
          }
        };
        draw_relay(1, id(relay1)); 
        // draw_relay(2, id(relay2));
        // draw_relay(3, id(relay3)); draw_relay(4, id(relay4));
        // ... (analogicznie reszta przekaźników)
        // draw_relay(5, id(relay5)); draw_relay(6, id(relay6));
        // draw_relay(7, id(relay7)); draw_relay(8, id(relay8));
        // draw_relay(9, id(relay9)); draw_relay(10, id(relay10));
        // draw_relay(11, id(relay11)); draw_relay(12, id(relay12));
      }










