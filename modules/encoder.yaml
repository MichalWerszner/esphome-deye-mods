# KY-040 enkoder - Sterowanie i Interakcja
sensor:
  - platform: rotary_encoder
    name: "Encoder"
    pin_a: ${encoder_clk}
    pin_b: ${encoder_dt}
    id: encoder_rot
    resolution: 4
    on_value:
      then:
        - lambda: |-
            // 1. Każdy obrót aktywuje tryb edycji i zatrzymuje autoscroll OLED
            id(is_editing) = true; 
          
            // Logika zmiany wartości IP, maski, gateway, DHCP/static - zależna od aktualnej strony OLED
            // zapis do globals
            // Przykład: zmiana adresu Modbus przez obrót
            if (id(oled_page) == 0) {
              // Strona NET: Zmiana trybu 1-4
              if (x > id(encoder_old_pos)) {
                if (id(network_mode_global) < 4) id(network_mode_global)++;
              } else if (x < id(encoder_old_pos)) {
                if (id(network_mode_global) > 1) id(network_mode_global)--;
              }
            } 
            else if (id(oled_page) == 1) {
              // Strona MODBUS: Zmiana adresu
              if (x > id(encoder_old_pos)) {
                id(modbus_address)++;
              } else if (x < id(encoder_old_pos)) {
                id(modbus_address)--;
              }
            }
            else {
              // Na pozostałych stronach obrót po prostu ręcznie przełącza strony
              if (x > id(encoder_old_pos)) {
                id(oled_page)++;
                if (id(oled_page) > 4) id(oled_page) = 0;
              } else if (x < id(encoder_old_pos)) {
                if (id(oled_page) == 0) id(oled_page) = 4;
                else id(oled_page)--;
              }
            }
            // Aktualizacja starej wartości do porównania przy następnym ruchu
            id(encoder_old_pos) = x;

# Przycisk enkodera jako zatwierdzenie i Reboot
binary_sensor:
  - platform: gpio
    pin:
      number: ${encoder_sw}
      inverted: true
      mode: INPUT
    id: encoder_sw_btn
    on_press:
      then:
        - logger.log: "Przycisk naciśnięty - obsługa kontekstowa"
        - lambda: |-
            if (id(is_editing)) {
              // Jeśli byliśmy w trybie edycji, kliknięcie ZAPISUJE i WYCHODZI
              // Zatwierdzenie zmian
              id(network_mode_global).execute_restore();
              id(modbus_address).execute_restore();
              // Powrót do autoscrolla
              id(is_editing) = false; 

              // Jeśli zmieniliśmy tryb sieci, wymagany reboot by przełączyć interfejsy
              // Reboot tylko przy zmianie sieci
              if (id(oled_page) == 0) App.reboot(); 
              
              // Jeśli jesteś na stronie RELAYS (4), kliknięcie przełącza stan przekaźnika
              if (id(oled_page) == 4) {
                // Przykład dla R1
                id(relay1).toggle(); 
              }
            } else {
              // Wejdź w tryb edycji
              id(is_editing) = true; 
            }
    on_double_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - lambda: |-
            // Dwuklik to wyjście z edycji BEZ zapisu (anuluj)
            id(is_editing) = false;
            // Powrót na stronę główną
            id(oled_page) = 0; 

# Timer powrotu do autoscrolla po 10s bezczynności
interval:
  - interval: 10s
    then:
      - lambda: 'id(is_editing) = false;'





