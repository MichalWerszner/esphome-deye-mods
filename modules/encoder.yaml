# Przycisk enkodera jako zatwierdzenie i Reboot
binary_sensor:
  - platform: gpio
    pin:
      number: ${encoder_sw}
      inverted: true
      mode: INPUT_PULLUP
    id: encoder_sw_btn
    on_press:
      then:
        - lambda: |-
            if (id(is_editing)) {
              // Zatwierdzenie zmian
              id(network_mode_global).execute_restore();
              id(modbus_address).execute_restore();
              id(is_editing) = false; // Powrót do autoscrolla
              
              if (id(oled_page) == 0) App.reboot(); // Reboot tylko przy zmianie sieci
              
              // Jeśli jesteś na stronie RELAYS (4), kliknięcie przełącza stan przekaźnika
              if (id(oled_page) == 4) {
                 id(relay1).toggle(); // Przykład dla R1
              }
            } else {
              id(is_editing) = true; // Wejdź w tryb edycji
            }
    on_double_click: 1s
    then:
      - lambda: id(is_editing) = false; // Wyjście bez zapisu

# Timer powrotu do autoscrolla po 10s bezczynności
interval:
  - interval: 10s
    then:
      - lambda: 'id(is_editing) = false;'
