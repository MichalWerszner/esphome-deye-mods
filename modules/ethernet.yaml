ethernet:
# To 'id' pozwoli nam odwoływać się do ethernetu
  id: eth_interface
  # Piny bierzemy z substitutions, żeby moduł był uniwersalny
  type: LAN8720
  mdc_pin: ${eth_mdc_pin}
  mdio_pin: ${eth_mdio_pin}
  clk_mode: ${eth_clk_mode}
  phy_addr: ${eth_phy_addr}
  power_pin: ${eth_power_pin}
  
  # Logika wyboru IP - jeśli DHCP wyłączone w globals, ustaw statyka
  manual_ip:!lambda |-
    if (id(lan_dhcp).state) {
      return {}; 
    } else {
      network::ManualIP manual;
      manual.static_ip = network::IPAddress::from_string(id(lan_ip).state);
      manual.gateway = network::IPAddress::from_string(id(lan_gateway).state);
      manual.subnet = network::IPAddress::from_string(id(lan_mask).state);
      return manual;
    }

# Dodajemy priorytety, aby ESPHome wiedziało jak zarządzać ruchem
# Jeśli kabel jest wpięty, Ethernet ma pierwszeństwo (0), WiFi ma (1)
api:
  reboot_timeout: 15min


