# Logika wyboru interfejsu na etapie kompilacji
!if (substitutions.network_mode == "ETHERNET"):
  ethernet:
    type: LAN8720
    mdc_pin: ${eth_mdc_pin}
    mdio_pin: ${eth_mdio_pin}
    clk_mode: ${eth_clk_mode}
    phy_addr: ${eth_phy_addr}
    power_pin: ${eth_power_pin}
    manual_ip: !lambda |-
      if (id(lan_dhcp).state) {
        return {}; 
      } else {
        network::ManualIP manual;
        manual.static_ip = network::IPAddress::from_string(id(lan_ip).state);
        manual.gateway = network::IPAddress::from_string(id(lan_gateway).state);
        manual.subnet = network::IPAddress::from_string(id(lan_mask).state);
        return manual;
      }

!if (substitutions.network_mode == "WIFI"):
  wifi:
    networks:
      - ssid: !lambda 'return id(wifi_ssid_global).state.c_str();'
        password: !lambda 'return id(wifi_password_global).state.c_str();'
    ap:
      ssid: "${name}-fallback"
      password: ${fallback_password}
