globals:
  # WiFi Konfiguracja
  - id: wifi_ssid_global
    type: std::string
    restore_value: yes
    initial_value: '"${wifi_ssid}"' # Bierze z Twoich substitutions na start
  - id: wifi_password_global
    type: std::string
    restore_value: yes
    initial_value: '"${wifi_password}"'

  # Sieć IP
  - id: lan_dhcp
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: lan_ip
    type: std::string
    restore_value: yes
    initial_value: '"192.168.1.100"'
  - id: lan_gateway
    type: std::string
    restore_value: yes
    initial_value: '"192.168.1.1"'
  - id: lan_mask
    type: std::string
    restore_value: yes
    initial_value: '"255.255.255.0"'

  # Modbus Parametry
  - id: modbus_baud
    type: int
    restore_value: yes
    initial_value: '${baud_rate}'
  - id: modbus_address
    type: int
    restore_value: yes
    initial_value: '${modbus_inverter_address}'

  - id: oled_page
    type: int
    restore_value: yes
    initial_value: '0'  # Musi być w cudzysłowie!

  - id: relay_page
    type: int
    restore_value: yes
    initial_value: '0'  # Dodaj typ i wartość początkową
